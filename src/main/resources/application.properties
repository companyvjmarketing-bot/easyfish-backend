spring.application.name=backend3
server.port=${PORT:8080}

# =========================
# RAILWAY POSTGRESQL
# Add these values in Railway > Backend Service > Variables.
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# =========================
# LOCAL FILE FALLBACK
# Used only before Cloudflare R2 is configured.
# =========================
easyfish.upload-dir=${EASYFISH_UPLOAD_DIR:uploads}

# =========================
# CLOUDFLARE R2 IMAGE STORAGE
# R2 uses an S3-compatible API internally, but all configuration is R2-specific.
# =========================
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT:}
cloudflare.r2.region=${CLOUDFLARE_R2_REGION:auto}
cloudflare.r2.bucket=${CLOUDFLARE_R2_BUCKET:}
cloudflare.r2.public-url=${CLOUDFLARE_R2_PUBLIC_URL:}
cloudflare.r2.access-key-id=${CLOUDFLARE_R2_ACCESS_KEY_ID:}
cloudflare.r2.secret-access-key=${CLOUDFLARE_R2_SECRET_ACCESS_KEY:}
cloudflare.r2.presign-expiry-seconds=${CLOUDFLARE_R2_PRESIGN_EXPIRY_SECONDS:900}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================
# JWT
# =========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =========================
# BREVO TRANSACTIONAL EMAIL (HTTPS REST API)
# =========================
brevo.api-key=${BREVO_API_KEY:}
brevo.sender-email=${BREVO_SENDER_EMAIL:companyvjmarketing@gmail.com}
brevo.sender-name=${BREVO_SENDER_NAME:VJ Marketing Company}

# =========================
# ADMIN MAIL
# =========================
easyfish.admin-order-email.enabled=${ADMIN_ORDER_EMAIL_ENABLED:true}
easyfish.admin-order-email.to=${ADMIN_ORDER_EMAIL_TO:nabhasyafoods01@gmail.com}

# =========================
# RAZORPAY
# Add the webhook URL after Railway generates the public backend domain.
# =========================
razorpay.enabled=${RAZORPAY_ENABLED:true}
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}

# =========================
# FAST2SMS
# =========================
fast2sms.api-key=${FAST2SMS_API_KEY:}
fast2sms.route=${FAST2SMS_ROUTE:otp}
fast2sms.sender-id=${FAST2SMS_SENDER_ID:}
fast2sms.template-id=${FAST2SMS_TEMPLATE_ID:}

# =========================
# GOOGLE LOGIN
# =========================
google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}

# =========================
# TIMEZONE / PROXY
# =========================
spring.jackson.time-zone=Asia/Kolkata
server.forward-headers-strategy=framework

# =========================
# CORS - EXISTING FRONTEND LINKS KEPT
# =========================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://easyfish.in,https://www.easyfish.in,https://easyfish-store.netlify.app,https://easyfish-admin.netlify.app}
